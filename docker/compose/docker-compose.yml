#version: '3'

networks:
    mn_int:
        internal: true
    mn_ext:
services:
  traefik:
    image: traefik:v3.7.8
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mn_ext
  nginx:
    image: monkeynotes/mn-ui
    restart: unless-stopped
    volumes:
      - ./data/nginx:/etc/nginx/conf.d
      - ./data/nginx/env.js:/var/www/mn-ui/dist/env.js:ro
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mn-ui.rule=PathPrefix(`/`)"
      - "traefik.http.routers.mn-ui.entrypoints=web"
      - "traefik.http.services.mn-ui.loadbalancer.server.port=80"
    networks:
      - mn_int
      - mn_ext
  db:
    image: postgres:18.1
    restart: on-failure
    environment:
      POSTGRES_DB: monkey_db
      POSTGRES_USER: monkey_user
      POSTGRES_PASSWORD: monK3Y__42_Pa55w0rD
    volumes:
      - ./data/postgres:/var/lib/postgresql/data/pg14
    hostname: mn-db
    networks:
      - mn_int
  mn-api:
    depends_on:
      - db
    image: monkeynotes/mn-api:latest
    environment:
      - SPRING_PROFILES_ACTIVE=dist,init_admin
      - YOUR_DOMAIN=${YOUR_DOMAIN}
      - YOUR_DOMAIN_API=${YOUR_DOMAIN_API}
      - CORS_DOMAINS=${CORS_DOMAINS}
      - GDRIVE_CLIENT_ID=${GDRIVE_CLIENT_ID}
      - GDRIVE_SECRET=${GDRIVE_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QWEN_API_KEY=${QWEN_API_KEY}
    volumes:
      - ./data/mn_data/:/mn_data
      - ./data/logs/:/logs
    networks:
      - mn_int
      - mn_ext
